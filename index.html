<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TashiGo - Akıllı Dolap Entegreli P2P Kargo Sistemi</title>
    
    <!-- Premium Google Fontlar (Outfit & Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Tasarım Şablonu -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Canlı Arka Plan Küreleri (Lively Background Orbs) -->
    <div class="glow-bg-orb orb-1"></div>
    <div class="glow-bg-orb orb-2"></div>
    <div class="glow-bg-orb orb-3"></div>

    <!-- Dinamik Uygulama Kökü -->
    <div id="app-root"></div>

    <!-- Bildirim Balonu (Toast Notification) -->
    <div id="toast" class="toast-msg"></div>

    <!-- Lucide İkonları CDN (Yüksek Kaliteli Vektörel İkonlar) -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Uygulama Durum Yönetimi & İş Mantığı -->
    <script src="app.js"></script>

</body>
</html>
